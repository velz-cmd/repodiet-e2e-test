name: Bootstrap RepoDiet hard fixture

on:
  push:
    branches: [main]
    paths:
      - scripts/bootstrap-hard-fixture.sh
      - .github/workflows/bootstrap-hard-fixture.yml

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, '[fixture-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build hard fixture
        run: bash scripts/bootstrap-hard-fixture.sh
      - name: Generate public lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test safety contract
        run: npm test
      - name: Verify protected and runtime files
        run: npm run verify:safety
      - name: Verify config references
        run: npm run check:config
      - name: Build
        run: npm run build
      - name: Commit fixture to main
        run: |
          git config user.name "RepoDiet Fixture Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "test: add full hard RepoDiet fixture [fixture-generated]"
          git push origin HEAD:main
