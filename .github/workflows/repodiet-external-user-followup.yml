name: RepoDiet External User Follow-up

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  followup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Recheck payment security and queued A2A task
        env:
          BASE_URL: https://skillswap-virid-kappa.vercel.app
          TEST_REPOSITORY: https://github.com/velz-cmd/repodiet-e2e-test
          PREVIOUS_TASK_ID: task_36f06adad9854d
          PREVIOUS_DEEP_SCAN_ID: deep_scan_G1nRqeA3Hsah
        run: |
          cat > /tmp/followup.mjs <<'EOF'
          import { writeFileSync, appendFileSync } from "node:fs";
          const base = process.env.BASE_URL;
          const repo = process.env.TEST_REPOSITORY;
          const records = [];
          const parse = (text) => { try { return JSON.parse(text); } catch { return text.slice(0, 4000); } };
          async function call(name, path, options = {}) {
            const started = Date.now();
            try {
              const response = await fetch(`${base}${path}`, {
                ...options,
                redirect: "manual",
                headers: { Accept: "application/json,text/plain,*/*", "User-Agent": "RepoDiet-Customer-Followup/1.0", ...(options.headers || {}) },
              });
              const text = await response.text();
              const record = { name, path, method: options.method || "GET", status: response.status, durationMs: Date.now() - started, body: parse(text) };
              records.push(record);
              return record;
            } catch (error) {
              const record = { name, path, method: options.method || "GET", status: null, durationMs: Date.now() - started, error: error instanceof Error ? error.message : String(error) };
              records.push(record);
              return record;
            }
          }

          const health = await call("health", "/api/okx/health");
          const previousTask = await call("previous_a2a_task", `/api/a2a/tasks/${process.env.PREVIOUS_TASK_ID}`);
          const previousDeepScan = await call("previous_deep_scan", `/api/deep-scans/${process.env.PREVIOUS_DEEP_SCAN_ID}`);
          const now = Date.now();
          const basePayload = { repositoryUrl: repo, branch: "main", maximumFindings: 3, operation: "analyze_repository" };
          const unpaid = await call("a2mcp_unpaid_unique", "/api/a2mcp/quick-triage", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...basePayload, idempotencyKey: `followup-unpaid-${now}` }),
          });
          const forged = await call("a2mcp_forged_unique", "/api/a2mcp/quick-triage", {
            method: "POST",
            headers: { "Content-Type": "application/json", "PAYMENT-SIGNATURE": "forged-customer-signature-unique" },
            body: JSON.stringify({ ...basePayload, idempotencyKey: `followup-forged-${now}` }),
          });

          const taskBody = previousTask.body && typeof previousTask.body === "object" ? previousTask.body : {};
          const deepBody = previousDeepScan.body && typeof previousDeepScan.body === "object" ? previousDeepScan.body : {};
          const healthBody = health.body && typeof health.body === "object" ? health.body : {};
          const createdAt = Date.parse(taskBody.createdAt || "");
          const taskAgeSeconds = Number.isFinite(createdAt) ? Math.floor((Date.now() - createdAt) / 1000) : null;
          const taskStatus = taskBody.status || null;
          const deepStatus = deepBody.status || deepBody.job?.status || deepBody.stage || null;
          const progressedBeyondQueued = Boolean(taskStatus && !["submitted", "queued"].includes(String(taskStatus).toLowerCase()));
          const forgedCode = forged.body && typeof forged.body === "object" ? forged.body.error?.code || forged.body.code || null : null;
          const forgedCorrectlyRejected = forged.status !== 200 && forgedCode !== "DUPLICATE_REQUEST";
          const assertions = {
            productionReachable: health.status === 200,
            a2mcpUnpaid402: unpaid.status === 402,
            forgedUniqueRejectedByPaymentValidation: forgedCorrectlyRejected,
            previousTaskRetrievable: previousTask.status === 200,
            previousTaskProgressedBeyondQueued: progressedBeyondQueued,
            deepScanRetrievable: previousDeepScan.status === 200,
            workerReadinessConsistent: !(healthBody.workerReady === true && taskAgeSeconds !== null && taskAgeSeconds > 180 && taskStatus === "queued" && !deepBody.workflowRunId && !deepBody.job?.workflowRunId),
          };
          const failed = Object.entries(assertions).filter(([, value]) => !value).map(([key]) => key);
          const output = {
            checkedAt: new Date().toISOString(),
            previousTaskId: process.env.PREVIOUS_TASK_ID,
            previousDeepScanId: process.env.PREVIOUS_DEEP_SCAN_ID,
            taskStatus,
            deepStatus,
            taskAgeSeconds,
            healthClaims: {
              a2aRuntimeReady: healthBody.a2aRuntimeReady ?? null,
              workerReady: healthBody.workerReady ?? null,
              dispatcherReady: healthBody.dispatcherReady ?? null,
              activeWorkflowRuns: healthBody.activeWorkflowRuns ?? null,
              activeWorkers: healthBody.activeWorkers ?? null,
              queueDepth: healthBody.queueDepth ?? null,
              activeJobs: healthBody.activeJobs ?? null,
            },
            unpaidStatus: unpaid.status,
            forgedStatus: forged.status,
            forgedCode,
            assertions,
            failed,
            verdict: failed.length ? "FAIL" : "PASS",
            records,
          };
          writeFileSync("repodiet-user-followup.json", JSON.stringify(output, null, 2));
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, `# RepoDiet external follow-up\n\n- Verdict: **${output.verdict}**\n- Existing A2A task: ${taskStatus || "unknown"} after ${taskAgeSeconds ?? "unknown"} seconds\n- Deep scan: ${deepStatus || "unknown"}\n- A2MCP unpaid: ${unpaid.status}\n- A2MCP forged unique: ${forged.status} (${forgedCode || "no code"})\n- Failed: ${failed.join(", ") || "none"}\n`);
          console.log(JSON.stringify(output, null, 2));
          EOF
          node /tmp/followup.mjs

      - name: Upload follow-up evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repodiet-external-user-followup
          path: repodiet-user-followup.json
          if-no-files-found: error
