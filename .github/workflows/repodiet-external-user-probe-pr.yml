name: RepoDiet External User Probe PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run anonymous production probe
        env:
          BASE_URL: https://skillswap-virid-kappa.vercel.app
          TEST_REPOSITORY: https://github.com/velz-cmd/repodiet-e2e-test
        run: |
          cat > /tmp/probe.mjs <<'EOF'
          import { writeFileSync, appendFileSync } from "node:fs";
          const base = process.env.BASE_URL;
          const repo = process.env.TEST_REPOSITORY;
          const records = [];
          const parse = (text) => { try { return JSON.parse(text); } catch { return text.slice(0, 4000); } };
          async function call(name, path, options = {}, timeoutMs = 45000) {
            const started = Date.now();
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
              const response = await fetch(`${base}${path}`, {
                ...options,
                signal: controller.signal,
                redirect: "manual",
                headers: {
                  Accept: "application/json,text/plain,*/*",
                  "User-Agent": "RepoDiet-Anonymous-Customer-Probe/1.0",
                  ...(options.headers || {}),
                },
              });
              const text = await response.text();
              const record = {
                name,
                method: options.method || "GET",
                path,
                status: response.status,
                durationMs: Date.now() - started,
                headers: {
                  "payment-required": response.headers.get("payment-required"),
                  "x-payment-required": response.headers.get("x-payment-required"),
                  "www-authenticate": response.headers.get("www-authenticate"),
                  "x-vercel-id": response.headers.get("x-vercel-id"),
                },
                body: parse(text),
              };
              records.push(record);
              return record;
            } catch (error) {
              const record = { name, method: options.method || "GET", path, status: null, durationMs: Date.now() - started, error: error instanceof Error ? error.message : String(error) };
              records.push(record);
              return record;
            } finally { clearTimeout(timer); }
          }

          const card = await call("agent_card", "/.well-known/agent-card.json");
          const health = await call("health", "/api/okx/health");
          const triageBody = JSON.stringify({ repositoryUrl: repo, branch: "main", maximumFindings: 3, operation: "analyze_repository", idempotencyKey: `gh-user-probe-${Date.now()}` });
          const unpaid = await call("a2mcp_unpaid", "/api/a2mcp/quick-triage", { method: "POST", headers: { "Content-Type": "application/json" }, body: triageBody });
          const forged = await call("a2mcp_forged_signature", "/api/a2mcp/quick-triage", { method: "POST", headers: { "Content-Type": "application/json", "PAYMENT-SIGNATURE": "forged-customer-signature" }, body: triageBody });
          const submit = await call("a2a_submit", "/api/a2a/tasks", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: "repository.safe_cleanup", repoUrl: repo, branch: "main", source: "github_actions_external_customer" }) });
          const taskId = submit.body && typeof submit.body === "object" ? submit.body.taskId : null;
          let latest = null;
          if (taskId) {
            const deadline = Date.now() + 120000;
            const terminal = new Set(["completed", "awaiting_payment", "awaiting_approval", "delivery_ready", "verification_failed", "analysis_failed", "delivery_failed", "failed"]);
            while (Date.now() < deadline) {
              await new Promise((resolve) => setTimeout(resolve, 3000));
              latest = await call("a2a_poll", `/api/a2a/tasks/${encodeURIComponent(taskId)}`, {}, 30000);
              const status = latest.body && typeof latest.body === "object" ? latest.body.status : null;
              if (status && terminal.has(status)) break;
              if (latest.status === null || (latest.status && latest.status >= 500)) break;
            }
          }
          const latestStatus = latest?.body && typeof latest.body === "object" ? latest.body.status : null;
          const assertions = {
            deploymentReachable: records.some((r) => r.status !== null),
            agentCard200: card.status === 200,
            healthReachable: health.status !== null,
            healthNo5xx: health.status !== null && health.status < 500,
            a2mcpReturns402: unpaid.status === 402,
            a2mcpChallengePresent: Boolean(unpaid.headers?.["payment-required"] || unpaid.headers?.["x-payment-required"] || (unpaid.body && typeof unpaid.body === "object")),
            forgedSignatureRejected: forged.status !== 200,
            a2aAccepted: submit.status !== null && submit.status >= 200 && submit.status < 300 && Boolean(taskId),
            a2aRetrievable: latest?.status === 200,
            a2aStatusPresent: Boolean(latestStatus),
          };
          const failed = Object.entries(assertions).filter(([, value]) => !value).map(([key]) => key);
          const output = { startedAt: new Date().toISOString(), base, repo, taskId, latestStatus, assertions, failed, verdict: failed.length ? "FAIL" : "PASS", records, note: "No payment, approval, repository write, or pull-request delivery was authorized by this probe." };
          writeFileSync("repodiet-user-probe.json", JSON.stringify(output, null, 2));
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, `# RepoDiet anonymous customer probe\n\n- Verdict: **${output.verdict}**\n- A2MCP unpaid: ${unpaid.status}\n- A2MCP forged signature: ${forged.status}\n- A2A submit: ${submit.status}\n- A2A task: ${taskId || "none"}\n- A2A latest status: ${latestStatus || "none"}\n- Failed: ${failed.join(", ") || "none"}\n\nNo funds were spent and no PR approval was called.\n`);
          console.log(JSON.stringify(output, null, 2));
          EOF
          node /tmp/probe.mjs

      - name: Upload probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repodiet-external-user-probe-pr
          path: repodiet-user-probe.json
          if-no-files-found: error
